<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">

<fontconfig>
	<match target="pattern">
		<test qual="any" name="family" compare="contains">
			<string>JetBrainsMono Nerd Font</string>
		</test>
		<edit name="fontfeatures" mode="append">
			<string>cv02=1</string>
			<string>cv03=1</string>
			<string>cv04=1</string>
			<string>cv05=1</string>
			<string>cv06=1</string>
			<string>cv07=1</string>
			<string>cv11=1</string>
			<string>cv12=1</string>
			<string>cv17=1</string>
			<string>cv18=1</string>
			<string>cv20=1</string>
			<string>cv99=1</string>
			<string>zero=1</string>
		</edit>
	</match>
	<match target="pattern">
		<test qual="any" name="family" compare="contains">
			<string>Maple Mono</string>
		</test>
		<edit name="fontfeatures" mode="append">
			<string>cv05=1</string>
		</edit>
	</match>
	<match target="pattern">
		<edit name="antialias" mode="assign"><bool>true</bool></edit>
	</match>
	<match target="pattern">
		<edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
	</match>
	<match target="pattern">
		<edit name="rgba" mode="assign"><const>rgb</const></edit>
	</match>
</fontconfig>
