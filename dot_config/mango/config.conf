### AUTOSTART
# once
exec-once=nm-applet
exec-once=blueman-applet
exec-once=dunst
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=wlroots
exec-once=waybar
exec-once=foot --server

### MONITOR
monitorrule=name:HDMI-A-1,width:1920,height:1080,refresh:100,x:0,y:0
monitorrule=name:eDP-1,width:1920,height:1200,refresh:60,x:1920,y:0,scale:1.5

### ENV
env=QS_ICON_THEME,Papirus-Dark
env=QT_QPA_PLATFORMTHEME,gtk3

### INPUT DEVICES
# mouse
accel_profile=0
# trackpad
trackpad_natural_scrolling=1

#### Misc
drag_tile_to_tile=1

# Disable overview hot corner
enable_hotarea=0

source=~/.config/mango/appearance.conf
source=~/.config/mango/keybindings.conf
source=~/.config/mango/layout.conf
source=~/.config/mango/windowrule.conf
