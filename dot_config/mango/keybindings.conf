### KEYBINDINGS
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER,r,reload_config

# exit & kill client
bind=SUPER+SHIFT,e,quit
bind=SUPER+SHIFT,q,killclient

# dmenu & terminal
bind=SUPER,d,spawn,rofi -show drun
bind=SUPER,Return,spawn,footclient

# switch window focus
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right

# swap windows
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right

# change window status
bind=SUPER,f,togglefullscreen
bind=SUPER+SHIFT,space,togglefloating
bind=SUPER,o,toggleoverview
bind=SUPER,a,togglemaximizescreen

# move to scratchpad
bind=SUPER,minus,toggle_scratchpad
bind=SUPER+SHIFT,minus,minimized

# switch workspaces
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# switch monitor focus
bind=SUPER+CTRL,h,focusmon,left
bind=SUPER+CTRL,l,focusmon,right

# move window to monitor
bind=SUPER+SHIFT+CTRL,h,tagmon,left
bind=SUPER+SHIFT+CTRL,l,tagmon,right

# resize window
bind=SUPER+Alt,h,movewin,-50,+0
bind=SUPER+Alt,j,movewin,+0,+50
bind=SUPER+Alt,k,movewin,+0,-50
bind=SUPER+Alt,l,movewin,+50,+0
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# move window
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# turn on/off outputs
bind=SUPER+SHIFT,o,toggle_monitor,eDP-1

# switch between master & scroller
bind=SUPER+SHIFT,r,setlayout,right_tile
bind=SUPER+SHIFT,l,setlayout,tile
bind=SUPER+SHIFT,s,setlayout,scroller

# take screenshot
bind=NONE,Print,spawn,~/.config/mango/scripts/screenshot.sh -f --savecopy
bind=ALT,Print,spawn,~/.config/mango/scripts/screenshot.sh -w --savecopy
bind=SHIFT,Print,spawn,~/.config/mango/scripts/screenshot.sh -a --savecopy
bind=CTRL,Print,spawn,~/.config/mango/scripts/screenshot.sh -f --copy
bind=CTRL+Alt,Print,spawn,~/.config/mango/scripts/screenshot.sh -w --copy
bind=CTRL+SHIFT,Print,spawn,~/.config/mango/scripts/screenshot.sh -a --copy
