monitor=HDMI-A-1,1920x1080@100,0x0,1
monitor=eDP-1,1920x1200@60,1920x0,1.5

$terminal = alacritty
$fileManager = pcmanfm
$menu = rofi -show drun -theme launcher

exec-once = waybar
exec-once = nm-applet
exec-once = blueman-applet

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_SCREENSHOTS_DIR,$HOME/Pictures/Screenshots

general {
    gaps_in = 4
    gaps_out = 10

    border_size = 1

    col.active_border = 0xff8E8E8E
    col.inactive_border = 0xff3D3839

    resize_on_border = false

    allow_tearing = true
    layout = master
}

master {
	new_status = slave
}

decoration {
    rounding = 6
    rounding_power = 2

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = false
        size = 6
        passes = 2

        vibrancy = 0.1696
    }
}

animations {
    enabled = no

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

misc {
    force_default_wallpaper = 1
    disable_hyprland_logo = true
	background_color = rgba(191919ff)
	vrr = 3
}

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
	accel_profile = flat

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

$mod = SUPER

binds {
	movefocus_cycles_groupfirst = true
}

bind = $mod, Return, exec, $terminal
bind = $mod SHIFT, Q, killactive,
bind = $mod SHIFT, E, exit,
bind = $mod, E, exec, $fileManager
bind = $mod SHIFT, space, togglefloating,
bind = $mod, D, exec, $menu
bind = $mod, P, exec, ~/.config/rofi/power.sh
bind = $mod, F, fullscreen

bind = $mod, l, movefocus, r
bind = $mod, h, movefocus, l
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u

bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, k, movewindow, u

bind = $mod CONTROL, h, moveintogroup, l  
bind = $mod CONTROL, j, moveintogroup, d  
bind = $mod CONTROL, k, moveintogroup, u    
bind = $mod CONTROL, l, moveintogroup, r

bind = $mod ALT, h, moveoutofgroup, l  
bind = $mod ALT, j, moveoutofgroup, d  
bind = $mod ALT, k, moveoutofgroup, u    
bind = $mod ALT, l, moveoutofgroup, r

workspace = 1, monitor:HDMI-A-1
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:eDP-1

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod, MINUS, togglespecialworkspace, magic
bind = $mod SHIFT, minus, movetoworkspace, special:magic
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bind = $mod SHIFT, o, exec, wlr-randr --output eDP-1 --toggle

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = $mod SHIFT, o, exec, toggle eDP-1
bind = $mod, w, togglegroup
bind = $mod, bracketleft, movegroupwindow, prev
bind = $mod, bracketright, movegroupwindow, next

bind = ,Print, exec, grimblast -n save output
bind = ALT, Print, exec, grimblast -n save active
bind = SHIFT, Print, exec, grimblast -n save area
bind = CONTROL, Print, exec, grimblast -n copy output
bind = CONTROL ALT, Print, exec, grimblast -n copy active
bind = CONTROL SHIFT, Print, exec, grimblast -n copy area

group {
	col.border_active = 0xff8E8E8E
	col.border_inactive = 0xff3D3839
	groupbar {
		font_family = IosevkaTerm Nerd Font Propo
		font_size = 14
		gradient_rounding = 6
		height = 25
		indicator_height = 0
		keep_upper_gap = false
		gradients = true
		text_color = 0xff191919
		text_color_inactive = 0xffBBBBBB
		col.active = 0xff8E8E8E
		col.inactive = 0xff262626
	}
}

windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
	name = enable-vrr
	match:class = ^steam_app.*
	no_vrr = false
	immediate = false
}

windowrule {
	name = enable-tearing
	match:class = cs2
	no_vrr = true
	immediate = true
}

ecosystem {
	no_update_news = true
	no_donation_nag = true
}
